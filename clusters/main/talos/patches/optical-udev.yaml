machine:
  udev:
    rules:
      - 'SUBSYSTEM=="block", KERNEL=="sr*", ATTRS{vendor}=="MATSHITA*", ATTRS{model}=="BD-MLT UJ265*", SYMLINK+="optical cdrom", GROUP="cdrom", MODE="0660"'
      - 'SUBSYSTEM=="scsi_generic", KERNEL=="sg*", ATTRS{vendor}=="MATSHITA*", ATTRS{model}=="BD-MLT UJ265*", SYMLINK+="optical-sg", GROUP="cdrom", MODE="0660"'
