---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onecli
  namespace: onecli
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    controllers:
      onecli:
        containers:
          app:
            image:
              repository: ghcr.io/onecli/onecli
              tag: 1.33.0@sha256:421a0f42d29ac2ea33223c113cf5dffca0642cc48db1ba98db166057c64b037a
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Stockholm
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: onecli-db-app
                    key: DATABASE_URL
              GATEWAY_PORT: "10255"
              GATEWAY_HOST: onecli-proxy.${DOMAIN_0}
              NEXT_PUBLIC_GATEWAY_URL: "https://onecli.${DOMAIN_0}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 10254
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 10254
                  initialDelaySeconds: 10
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: 10254
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi

    service:
      app:
        controller: onecli
        type: ClusterIP
        ports:
          http:
            port: 10254

      gateway:
        controller: onecli
        type: LoadBalancer
        annotations:
          metallb.io/address-pool: main
          metallb.io/loadBalancerIPs: ${ONECLI_PROXY_IP}
        externalTrafficPolicy: Local
        ports:
          gateway:
            port: 80
            targetPort: 10255
            protocol: TCP

    ingress:
      app:
        className: internal
        annotations:
          cert-manager.io/cluster-issuer: domain-0-le-prod
        hosts:
          - host: onecli.${DOMAIN_0}
            paths:
              - path: /api/vault
                service:
                  identifier: gateway
                  port: gateway
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - onecli.${DOMAIN_0}
            secretName: onecli-tls

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /app/data
