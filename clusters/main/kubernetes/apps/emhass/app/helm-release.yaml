---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emhass
  namespace: emhass
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      emhass:
        containers:
          app:
            image:
              repository: ghcr.io/kallegrens/emhass
              # Custom build from fork with two fixes:
              # 1. Solcast Accept header + sub-30min resampling (PR #739)
              # 2. Gracefully skip empty days in REST API retrieval (PR #740)
              # Revert to ghcr.io/davidusb-geek/emhass once PRs are merged.
              tag: fix-solcast-and-empty-days
            env:
              TZ: Europe/Stockholm
            probes:
              liveness:
                # Exec probe checks if MPC is actually producing output.
                # The HTTP probe would pass even if the continual_publish
                # thread crashed (Flask stays up, sensors go stale).
                # MPC runs every 4 min, so 15 min staleness = something broke.
                # Grace period: skip check for first 10 min of CONTAINER life.
                # NOTE: /proc/uptime tracks pod (sandbox) uptime, NOT container
                # uptime — it does not reset on container restart. We derive
                # true container age from PID 1's start time instead.
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - |
                        up=$(awk '{print int($1)}' /proc/uptime)
                        p1=$(awk '{print int($22/100)}' /proc/1/stat)
                        age=$((up - p1))
                        [ "$age" -lt 600 ] && exit 0
                        find /data/opt_res_latest.csv -mmin -15 | grep -q .
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 5000
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 4Gi

    service:
      app:
        controller: emhass
        ports:
          http:
            port: 5000

    ingress:
      app:
        className: internal
        annotations:
          cert-manager.io/cluster-issuer: domain-0-le-prod
        hosts:
          - host: emhass.${DOMAIN_0}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - emhass.${DOMAIN_0}
            secretName: emhass-tls

    persistence:
      secrets:
        type: secret
        name: emhass-secrets
        globalMounts:
          - path: /app/secrets_emhass.yaml
            subPath: secrets_emhass.yaml
            readOnly: true
      config:
        type: configMap
        name: emhass-config
        globalMounts:
          - path: /share/config.json
            subPath: config.json
            readOnly: false
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        globalMounts:
          - path: /data
