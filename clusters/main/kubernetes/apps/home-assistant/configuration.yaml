# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:
# Text to speech
tts:
  - platform: google_translate

lovelace:
  mode: storage
  dashboards:
    ev-charging:
      mode: yaml
      title: EV Charging
      icon: mdi:ev-station
      show_in_sidebar: true
      filename: dashboards/ev-charging.yaml

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
recorder:
  purge_keep_days: 365
  commit_interval: 3
  db_url: "postgresql://home-assistant:PLACEHOLDERPASSWORD@home-assistant-cnpg-main-rw:5432/home-assistant?client_encoding=utf8"

# ---------------------------------------------------------------------------
# Manual toggles
# ---------------------------------------------------------------------------
input_boolean:
  solar_panels_snow_covered:
    name: Solar panels snow covered
    icon: mdi:snowflake-alert
  emhass_send_tail_prices:
    name: EMHASS send tail prices (3rd day)
    icon: mdi:calendar-arrow-right
    initial: true
  ev_charge_requested:
    name: EV charge requested
    icon: mdi:ev-station
    initial: false

input_datetime:
  emhass_last_publish:
    name: EMHASS last publish
    icon: mdi:heart-pulse
    has_date: true
    has_time: true
  ev_ready_by:
    name: EV ready by
    icon: mdi:clock-end
    has_date: true
    has_time: true

input_number:
  emhass_idle_streak:
    name: EMHASS consecutive idle count
    icon: mdi:counter
    min: 0
    max: 100
    step: 1
    initial: 0
    mode: box
  ev_target_soc:
    name: EV target SOC
    icon: mdi:battery-charging-80
    min: 10
    max: 100
    step: 5
    initial: 80
    unit_of_measurement: "%"
    mode: slider

# ---------------------------------------------------------------------------
# EMHASS REST commands
# ---------------------------------------------------------------------------
rest_command:
  emhass_mpc_optim:
    url: "http://emhass.emhass.svc.cluster.local:5000/action/naive-mpc-optim"
    method: POST
    content_type: "application/json"
    timeout: 300
    payload: >-
      {%- set curr_soc = states('sensor.goodwe_battery_state_of_charge') | float(0) / 100 -%}
      {%- set snow = is_state('input_boolean.solar_panels_snow_covered', 'on') -%}
      {%- set bms_no_discharge = is_state('binary_sensor.bms_discharge_disabled', 'on') -%}
      {%- set bms_no_charge = is_state('binary_sensor.bms_charge_disabled', 'on') -%}
      {%- set max_horizon_slots = 288 -%}
      {%- set slots_per_day = 96 -%}
      {%- set slot_minutes = 15 -%}
      {%- set all_buy = state_attr('sensor.emhass_buy_price_forecast', 'prices') | default({}, true) -%}
      {%- set all_sell = state_attr('sensor.emhass_sell_price_forecast', 'prices') | default({}, true) -%}
      {%- set t = now() -%}
      {%- set slot_epoch = as_timestamp(t.replace(minute=(t.minute // slot_minutes) * slot_minutes, second=0, microsecond=0)) -%}
      {%- set buy_dict = namespace(d={}) -%}
      {%- set sell_dict = namespace(d={}) -%}
      {%- for ts_key, price in all_buy.items() if as_timestamp(ts_key) >= slot_epoch -%}
        {%- set buy_dict.d = dict(buy_dict.d, **{ts_key: price}) -%}
      {%- endfor -%}
      {%- for ts_key, price in all_sell.items() if as_timestamp(ts_key) >= slot_epoch -%}
        {%- set sell_dict.d = dict(sell_dict.d, **{ts_key: price}) -%}
      {%- endfor -%}
      {%- set horizon = [sell_dict.d | length, max_horizon_slots] | min -%}
      {%- set ev_requested = is_state('input_boolean.ev_charge_requested', 'on') -%}
      {%- set ev_home = is_state('device_tracker.vw_id_4_position', 'home') -%}
      {%- set ev_plugged = states('sensor.laddare_vid_husknuten_status') in ['awaiting_start', 'charging', 'completed'] -%}
      {%- set ev_soc_raw = states('sensor.wvgzzze2znp061751_battery_level') -%}
      {%- set ev_soc = ev_soc_raw | float(-1) -%}
      {%- set ev_target = states('input_number.ev_target_soc') | float(80) -%}
      {%- set ev_battery_kwh = 77 -%}
      {%- set ev_charge_kw = 11.04 -%}
      {%- set ev_charge_overhead = 1.05 -%}
      {%- set slot_seconds = slot_minutes * 60 -%}
      {%- set ev_active = ev_requested and ev_home and ev_plugged and ev_soc >= 0 and ev_soc < ev_target -%}
      {%- if ev_active -%}
        {%- set ev_hours_raw = ((ev_target - ev_soc) / 100 * ev_battery_kwh / ev_charge_kw * ev_charge_overhead) | round(2) -%}
        {%- set ev_ready_ts = state_attr('input_datetime.ev_ready_by', 'timestamp') | float(0) -%}
        {%- set ev_deadline_slots = ((ev_ready_ts - as_timestamp(now())) / slot_seconds) | int -%}
        {#- Deadline beyond horizon: defer scheduling until horizon catches up -#}
        {%- if ev_deadline_slots > horizon -%}
          {%- set ev_hours = 0 -%}
          {%- set ev_deadline = 0 -%}
        {%- else -%}
          {%- set ev_deadline = [[ev_deadline_slots, 1] | max, horizon] | min -%}
          {#- Cap hours to what physically fits in the deadline slots -#}
          {%- set max_ev_hours = (ev_deadline * slot_minutes / 60) | round(2) -%}
          {%- set ev_hours = [ev_hours_raw, max_ev_hours] | min -%}
        {%- endif -%}
      {%- else -%}
        {%- set ev_hours = 0 -%}
        {%- set ev_hours_raw = 0 -%}
        {%- set ev_deadline = 0 -%}
      {%- endif -%}
      {%- set ev_charging = is_state('sensor.laddare_vid_husknuten_status', 'charging') -%}
      {
        "soc_init": {{ curr_soc }},
        "soc_final": {{ curr_soc }},
        "prediction_horizon": {{ horizon }},
        "operating_hours_of_each_deferrable_load": [{{ ev_hours }}],
        "def_current_state": [{{ ev_charging | lower }}],
        "treat_deferrable_load_as_semi_cont": [false],
        "set_deferrable_load_single_constant": [false],
        "end_timesteps_of_each_deferrable_load": [{{ ev_deadline }}],
        "load_cost_forecast": {{ buy_dict.d | tojson }},
        "prod_price_forecast": {{ sell_dict.d | tojson }},
        "battery_minimum_state_of_charge": {{ curr_soc if bms_no_discharge else 0.05 }},
        "battery_maximum_state_of_charge": {{ curr_soc if bms_no_charge else 1.0 }}
        {%- if snow -%}
          {%- set ypv = state_attr('sensor.pv_daily_profile', 'yesterday') | default([], true) -%}
          {%- set slot_idx = (now().hour * (slots_per_day // 24)) + (now().minute // slot_minutes) -%}
          {%- set ns = namespace(pv=[]) -%}
          {%- for i in range(horizon) -%}
            {%- set idx = (slot_idx + i) % slots_per_day -%}
            {%- if idx < ypv | length -%}
              {%- set ns.pv = ns.pv + [ypv[idx] | float(0)] -%}
            {%- else -%}
              {%- set ns.pv = ns.pv + [0] -%}
            {%- endif -%}
          {%- endfor -%}
          ,"pv_power_forecast": {{ ns.pv | tojson }}
        {%- endif %}
      }

  emhass_weather_cache:
    url: "http://emhass.emhass.svc.cluster.local:5000/action/weather-forecast-cache"
    method: POST
    content_type: "application/json"
    payload: "{}"
    timeout: 60

  emhass_publish_data:
    url: "http://emhass.emhass.svc.cluster.local:5000/action/publish-data"
    method: POST
    content_type: "application/json"
    payload: "{}"
    timeout: 300

# ---------------------------------------------------------------------------
# Template sensors
# ---------------------------------------------------------------------------
template:
  # House consumption excluding deferrable loads (EV charger).
  # Easee reports power in kW; convert to W so it graphs alongside GoodWe
  - sensor:
      - name: "EV Charger Power"
        unique_id: ev_charger_power_w
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {{ (states('sensor.laddare_vid_husknuten_power') | float(0) * 1000) | round(0) }}

  # EMHASS needs load_no_var_loads = total consumption minus any loads
  # it schedules as deferrable, otherwise it double-counts them.
  - sensor:
      - name: "House Consumption No EV"
        unique_id: house_consumption_no_ev
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {% set total = states('sensor.goodwe_house_consumption') | float(0) %}
          {% set ev_w = states('sensor.ev_charger_power') | float(0) %}
          {{ [total - ev_w, 0] | max | round(0) }}

      # HP Power Estimation — temp-dependent model from GoodWe correlation
      # Heating: linear fit R²=0.91, slope=-32.7 W/°C (compressor works harder when cold)
      # DHW: constant (temp effect not significant, p=0.30)
      # Calibrated from 131K samples, Jan-Mar 2026
      # UPSTREAM BUG: cooling_operational_status = actually DHW (issue #52)
      # https://github.com/klejejs/python-thermia-online-api/issues/52
      - name: "HP Heating Power"
        unique_id: hp_heating_power
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        icon: mdi:radiator
        state: >-
          {% set comp = is_state('binary_sensor.lavendelgangen_3_compr_operational_status', 'on') %}
          {% set heating = is_state('binary_sensor.lavendelgangen_3_heating_operational_status', 'on') %}
          {% set dhw = is_state('binary_sensor.lavendelgangen_3_cooling_operational_status', 'on') %}
          {% set brine = is_state('binary_sensor.lavendelgangen_3_brinepump_operational_status', 'on') %}
          {% set rad = is_state('binary_sensor.lavendelgangen_3_radiatorpump_operational_status', 'on') %}
          {% set t_out = states('sensor.lavendelgangen_3_outdoor_temperature') | float(0) %}
          {% set aux3 = is_state('binary_sensor.lavendelgangen_3_3kw_power_status', 'on') %}
          {% set aux6 = is_state('binary_sensor.lavendelgangen_3_6kw_power_status', 'on') %}
          {% set aux9 = is_state('binary_sensor.lavendelgangen_3_9kw_power_status', 'on') %}
          {% set aux12 = is_state('binary_sensor.lavendelgangen_3_12kw_power_status', 'on') %}
          {% set aux15 = is_state('binary_sensor.lavendelgangen_3_15kw_power_status', 'on') %}
          {% set aux_w = 15000 if aux15 else (12000 if aux12 else (9000 if aux9 else (6000 if aux6 else (3000 if aux3 else 0)))) %}
          {% set comp_brine_w = [(-32.7 * t_out + 2585) | round(0) | int, 500] | max if (comp and heating and not dhw) else 0 %}
          {% set rad_w = 244 if rad else 0 %}
          {{ (comp_brine_w + rad_w + (aux_w if (heating and not dhw) else 0)) | int }}

      - name: "HP Hot Water Power"
        unique_id: hp_hot_water_power
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        icon: mdi:water-boiler
        state: >-
          {% set comp = is_state('binary_sensor.lavendelgangen_3_compr_operational_status', 'on') %}
          {% set dhw = is_state('binary_sensor.lavendelgangen_3_cooling_operational_status', 'on') %}
          {% set brine = is_state('binary_sensor.lavendelgangen_3_brinepump_operational_status', 'on') %}
          {% set aux3 = is_state('binary_sensor.lavendelgangen_3_3kw_power_status', 'on') %}
          {% set aux6 = is_state('binary_sensor.lavendelgangen_3_6kw_power_status', 'on') %}
          {% set aux9 = is_state('binary_sensor.lavendelgangen_3_9kw_power_status', 'on') %}
          {% set aux12 = is_state('binary_sensor.lavendelgangen_3_12kw_power_status', 'on') %}
          {% set aux15 = is_state('binary_sensor.lavendelgangen_3_15kw_power_status', 'on') %}
          {% set aux_w = 15000 if aux15 else (12000 if aux12 else (9000 if aux9 else (6000 if aux6 else (3000 if aux3 else 0)))) %}
          {% set dhw_w = 3404 if (comp and dhw) else 0 %}
          {{ (dhw_w + (aux_w if dhw else 0)) | int }}

  - binary_sensor:
      - name: "EV charge request valid"
        unique_id: ev_charge_request_valid
        icon: mdi:ev-station
        state: >-
          {% set ready = state_attr('input_datetime.ev_ready_by', 'timestamp') | float(0) %}
          {{ ready > as_timestamp(now()) }}

  - trigger:
      - trigger: time
        at: "13:05:00"
      - trigger: event
        event_type: tibber_cache_refresh
      - trigger: template
        value_template: >-
          {{ state_attr('sensor.nordpool_kwh_se3_sek_3_10_0', 'tomorrow_valid') == true }}
    action:
      - action: tibber.get_prices
        data:
          start: "{{ today_at('00:00') }}"
          end: "{{ today_at('00:00') + timedelta(days=2) }}"
        response_variable: tibber_result
    sensor:
      - name: "Tibber Cached Prices"
        unique_id: tibber_cached_prices
        state: >-
          {{ tibber_result.prices['Lavendelgången 3'] | length }}
        unit_of_measurement: "entries"
        attributes:
          prices: >-
            {{ tibber_result.prices['Lavendelgången 3'] }}
          last_fetch: "{{ now().isoformat() }}"

  # Pre-computed buy/sell price forecasts for EMHASS.
  # Merges Tibber (incl. VAT+markup) with Nordpool (fallback), adds
  # energiskatt+nätavgift for buy, grid compensation for sell, and
  # appends a tail-extension day for horizon padding.
  # Triggers whenever Tibber cache or Nordpool data changes.
  - trigger:
      - trigger: state
        entity_id: sensor.tibber_cached_prices
      - trigger: state
        entity_id: sensor.nordpool_kwh_se3_sek_3_10_0
      - trigger: state
        entity_id: input_boolean.emhass_send_tail_prices
      - trigger: time_pattern
        minutes: "/15"
    sensor:
      - name: "EMHASS Buy Price Forecast"
        unique_id: emhass_buy_price_forecast
        unit_of_measurement: "SEK/kWh"
        state_class: measurement
        state: >-
          {%- set slot_minutes = 15 -%}
          {%- set t = now() -%}
          {%- set slot_key = t.replace(minute=(t.minute // slot_minutes) * slot_minutes, second=0, microsecond=0).strftime('%Y-%m-%d %H:%M:%S%z') -%}
          {%- set slot_key = slot_key[:-2] ~ ':' ~ slot_key[-2:] -%}
          {%- set prices = this.attributes.get('prices', {}) -%}
          {{ prices.get(slot_key) if prices.get(slot_key) is not none else none }}
        attributes:
          prices: >-
            {%- set energiskatt_och_natavgift = 0.607 -%}
            {%- set tibber_vat_multiplier = 1.25 -%}
            {%- set tibber_fixed_markup = 0.116 -%}
            {%- set seconds_per_day = 86400 -%}
            {%- set tibber_prices = state_attr('sensor.tibber_cached_prices', 'prices') | default([], true) -%}
            {%- set np_today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_0', 'raw_today') | default([], true) -%}
            {%- set np_tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_0', 'raw_tomorrow') | default([], true) -%}
            {%- set np_all = np_today + np_tomorrow -%}
            {%- set tibber_by_ts = namespace(d={}) -%}
            {%- for p in tibber_prices if p is mapping -%}
              {%- set ts_key = as_timestamp(p.start_time) | int | string -%}
              {%- set tibber_by_ts.d = dict(tibber_by_ts.d, **{ts_key: p.price}) -%}
            {%- endfor -%}
            {%- set buy_dict = namespace(d={}) -%}
            {%- for p in np_all if p is mapping -%}
              {%- set ts_key = as_timestamp(p.start) | int | string -%}
              {%- set tibber_price = tibber_by_ts.d.get(ts_key, none) -%}
              {%- if tibber_price is not none -%}
                {%- set buy_price = tibber_price -%}
              {%- else -%}
                {%- set buy_price = (p.value * tibber_vat_multiplier + tibber_fixed_markup) | round(4) -%}
              {%- endif -%}
              {%- set buy_dict.d = dict(buy_dict.d, **{p.start | string: (buy_price + energiskatt_och_natavgift) | round(4)}) -%}
            {%- endfor -%}
            {%- if is_state('input_boolean.emhass_send_tail_prices', 'on') -%}
              {%- set tail_src = np_tomorrow if np_tomorrow | length > 0 else np_today -%}
              {%- for p in tail_src if p is mapping -%}
                {%- set shifted_key = (as_timestamp(p.start) + seconds_per_day) | timestamp_local -%}
                {%- set buy_price = (p.value * tibber_vat_multiplier + tibber_fixed_markup + energiskatt_och_natavgift) | round(4) -%}
                {%- set buy_dict.d = dict(buy_dict.d, **{shifted_key: buy_price}) -%}
              {%- endfor -%}
            {%- endif -%}
            {{ buy_dict.d }}
          last_updated: "{{ now().isoformat() }}"

      - name: "EMHASS Sell Price Forecast"
        unique_id: emhass_sell_price_forecast
        unit_of_measurement: "SEK/kWh"
        state_class: measurement
        state: >-
          {%- set slot_minutes = 15 -%}
          {%- set t = now() -%}
          {%- set slot_key = t.replace(minute=(t.minute // slot_minutes) * slot_minutes, second=0, microsecond=0).strftime('%Y-%m-%d %H:%M:%S%z') -%}
          {%- set slot_key = slot_key[:-2] ~ ':' ~ slot_key[-2:] -%}
          {%- set prices = this.attributes.get('prices', {}) -%}
          {{ prices.get(slot_key) if prices.get(slot_key) is not none else none }}
        attributes:
          prices: >-
            {%- set grid_compensation = 0.047 -%}
            {%- set seconds_per_day = 86400 -%}
            {%- set np_today = state_attr('sensor.nordpool_kwh_se3_sek_3_10_0', 'raw_today') | default([], true) -%}
            {%- set np_tomorrow = state_attr('sensor.nordpool_kwh_se3_sek_3_10_0', 'raw_tomorrow') | default([], true) -%}
            {%- set np_all = np_today + np_tomorrow -%}
            {%- set sell_dict = namespace(d={}) -%}
            {%- for p in np_all if p is mapping -%}
              {%- set sell_dict.d = dict(sell_dict.d, **{p.start | string: (p.value + grid_compensation) | round(4)}) -%}
            {%- endfor -%}
            {%- if is_state('input_boolean.emhass_send_tail_prices', 'on') -%}
              {%- set tail_src = np_tomorrow if np_tomorrow | length > 0 else np_today -%}
              {%- for p in tail_src if p is mapping -%}
                {%- set shifted_key = (as_timestamp(p.start) + seconds_per_day) | timestamp_local -%}
                {%- set sell_price = (p.value + grid_compensation) | round(4) -%}
                {%- set sell_dict.d = dict(sell_dict.d, **{shifted_key: sell_price}) -%}
              {%- endfor -%}
            {%- endif -%}
            {{ sell_dict.d }}
          last_updated: "{{ now().isoformat() }}"

  # Yesterday's PV profile — 96 readings (one per 15-min slot).
  # Used by the MPC snow override: if panels are snow-covered, feed
  # yesterday's actual production instead of the clear-sky forecast.
  # Rolls over at the first sample after midnight each day.
  - trigger:
      - trigger: time_pattern
        minutes: "/15"
    sensor:
      - name: "PV Daily Profile"
        unique_id: pv_daily_profile
        state: >-
          {{ state_attr('sensor.pv_daily_profile', 'yesterday') | default([], true) | length }} entries
        attributes:
          today: >-
            {% set stored_date = this.attributes.get('date', '') %}
            {% set today_str = now().strftime('%Y-%m-%d') %}
            {% if stored_date != today_str %}
              {{ [states('sensor.goodwe_pv_power') | float(0)] }}
            {% else %}
              {{ this.attributes.get('today', []) + [states('sensor.goodwe_pv_power') | float(0)] }}
            {% endif %}
          yesterday: >-
            {% set stored_date = this.attributes.get('date', '') %}
            {% set today_str = now().strftime('%Y-%m-%d') %}
            {% if stored_date != today_str %}
              {{ this.attributes.get('today', []) }}
            {% else %}
              {{ this.attributes.get('yesterday', []) }}
            {% endif %}
          date: "{{ now().strftime('%Y-%m-%d') }}"

  # Grid power with flipped sign convention: positive = importing, negative = exporting.
  # Replaces the Tibber Pulse for real-time grid power in the Energy Dashboard.
  - sensor:
      - name: "Grid Power"
        unique_id: grid_power
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        state: >-
          {{ -(states('sensor.goodwe_meter_active_power_total') | float(0)) }}

  # Solar surplus available for EV charging.
  # Uses PV production directly (not the grid meter) so battery discharge
  # is never mistaken for solar surplus. Subtracts house load (excl. EV)
  # and EMHASS-commanded battery charging (eco_charge, ems_mode=auto).
  #
  # In idle mode (general + charge_pv), the battery absorbs PV surplus
  # opportunistically — but yields automatically when the EV starts,
  # because charge_pv(0) only charges from true PV surplus after the
  # grid meter. So we DON'T subtract idle-mode battery charge here;
  # the inverter self-balances.
  #
  # goodwe_battery_power sign: positive = discharging, negative = charging.
  - sensor:
      - name: "Solar Surplus for EV"
        unique_id: solar_surplus_for_ev
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        icon: mdi:solar-power-variant
        state: >-
          {% set pv = states('sensor.goodwe_pv_power') | float(0) %}
          {% set house = states('sensor.house_consumption_no_ev') | float(0) %}
          {% set batt = states('sensor.goodwe_battery_power') | float(0) %}
          {% set ems = states('select.goodwe_ems_mode') %}
          {% set emhass_charging = ems == 'auto' and batt < 0 %}
          {% set batt_charge = (-batt) if emhass_charging else 0 %}
          {{ [pv - house - batt_charge, 0] | max | round(0) }}

  # Snow detector: fires when forecast > min_forecast_w but actual < snow_threshold (5%).
  # An automation latches input_boolean.solar_panels_snow_covered ON
  # when this turns on. A separate automation clears the boolean when
  # actual PV recovers (> 50% of forecast for 30 min).
  - binary_sensor:
      - name: Solar Snow Detected
        unique_id: solar_snow_detected
        device_class: problem
        state: >-
          {% set min_forecast_w = 100 %}
          {% set snow_threshold = 0.05 %}
          {% set forecast = states('sensor.p_pv_forecast') | float(0) %}
          {% set actual = states('sensor.goodwe_pv_power') | float(0) %}
          {{ forecast > min_forecast_w and actual < forecast * snow_threshold }}
        icon: >-
          {{ 'mdi:snowflake-alert' if this.state == 'on' else 'mdi:solar-panel' }}

      # BMS limit detection — parsed from GoodWe diagnostic status register.
      # delay_on: flag must persist 2 min before clamp activates (debounce
      #   mode-switch noise — the diag register flips between "Charge time
      #   on" / "Discharge time on" every ~7 min but BMS flags stay stable).
      # delay_off: wait 5 min after BMS lifts restriction before unclamping
      #   (prevents oscillation at the BMS edge).
      # These feed into the MPC payload to set battery_minimum/maximum_soc
      # equal to current SOC, so EMHASS doesn't plan impossible actions.
      - name: BMS Discharge Disabled
        unique_id: bms_discharge_disabled
        device_class: problem
        delay_on:
          minutes: 2
        delay_off:
          minutes: 5
        state: >-
          {{ 'BMS: Discharge disabled' in states('sensor.goodwe_diag_status') }}
        icon: >-
          {{ 'mdi:battery-off-outline' if this.state == 'on' else 'mdi:battery' }}

      - name: BMS Charge Disabled
        unique_id: bms_charge_disabled
        device_class: problem
        delay_on:
          minutes: 2
        delay_off:
          minutes: 5
        state: >-
          {{ 'BMS: Charge disabled' in states('sensor.goodwe_diag_status') }}
        icon: >-
          {{ 'mdi:battery-charging-off' if this.state == 'on' else 'mdi:battery-charging' }}

  # ---------------------------------------------------------------------------
  # EV plan UI-layer sensors (for iOS widgets & mobile dashboard)
  # ---------------------------------------------------------------------------
  - trigger:
      - trigger: time_pattern
        minutes: "/1"
      - trigger: state
        entity_id:
          - input_boolean.ev_charge_requested
          - sensor.laddare_vid_husknuten_status
          - sensor.laddare_vid_husknuten_power
          - sensor.wvgzzze2znp061751_battery_level
          - input_number.ev_target_soc
          - input_datetime.ev_ready_by
          - device_tracker.vw_id_4_position
    sensor:
      - name: "EV Plan Status"
        unique_id: ev_plan_status
        icon: >-
          {% set s = this.state %}
          {% if s == 'charging' %}mdi:ev-station
          {% elif s == 'scheduled' %}mdi:calendar-clock
          {% elif s == 'complete' %}mdi:check-circle
          {% elif s == 'paused' %}mdi:pause-circle
          {% elif s == 'not home' %}mdi:car-off
          {% elif s == 'not plugged in' %}mdi:power-plug-off
          {% else %}mdi:ev-plug-type2
          {% endif %}
        state: >-
          {% set requested = is_state('input_boolean.ev_charge_requested', 'on') %}
          {% set charger = states('sensor.laddare_vid_husknuten_status') %}
          {% set soc = states('sensor.wvgzzze2znp061751_battery_level') | float(-1) %}
          {% set target = states('input_number.ev_target_soc') | float(80) %}
          {% set pos = states('device_tracker.vw_id_4_position') %}
          {% set home = pos in ['home', 'unknown', 'unavailable'] %}
          {% set plugged = charger in ['awaiting_start', 'charging', 'completed'] %}
          {% if not requested %}
            idle
          {% elif not home %}
            not home
          {% elif not plugged %}
            not plugged in
          {% elif soc >= target %}
            complete
          {% elif charger == 'charging' %}
            charging
          {% elif charger == 'awaiting_start' %}
            scheduled
          {% else %}
            paused
          {% endif %}

      - name: "EV Plan Progress"
        unique_id: ev_plan_progress_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:progress-check
        state: >-
          {% set soc = states('sensor.wvgzzze2znp061751_battery_level') | float(0) %}
          {% set target = states('input_number.ev_target_soc') | float(0) %}
          {% if target <= 0 %}
            0
          {% else %}
            {{ [[((soc / target) * 100) | round(0), 0] | max, 100] | min }}
          {% endif %}

      - name: "EV Plan Time Remaining"
        unique_id: ev_plan_time_remaining
        icon: mdi:timer-sand
        state: >-
          {% set requested = is_state('input_boolean.ev_charge_requested', 'on') %}
          {% if not requested %}
            —
          {% else %}
            {% set ready_ts = state_attr('input_datetime.ev_ready_by', 'timestamp') | float(0) %}
            {% set secs = (ready_ts - as_timestamp(now())) | int %}
            {% if secs <= 0 %}
              overdue
            {% else %}
              {% set h = (secs // 3600) %}
              {% set m = ((secs % 3600) // 60) %}
              {{ (h ~ 'h ' if h > 0 else '') ~ m ~ 'm' }}
            {% endif %}
          {% endif %}

      - name: "EV Plan Energy Needed"
        unique_id: ev_plan_energy_needed
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:lightning-bolt
        state: >-
          {% set soc = states('sensor.wvgzzze2znp061751_battery_level') | float(0) %}
          {% set target = states('input_number.ev_target_soc') | float(80) %}
          {% set battery_kwh = 77 %}
          {% set overhead = 1.05 %}
          {% set needed = ((target - soc) / 100 * battery_kwh * overhead) %}
          {{ [needed, 0] | max | round(1) }}

# ---------------------------------------------------------------------------
# Riemann-sum energy sensors (power → kWh for Energy Dashboard)
# ---------------------------------------------------------------------------
sensor:
  - platform: integration
    source: sensor.hp_heating_power
    name: HP Heating Energy
    unique_id: hp_heating_energy
    unit_prefix: k
    unit_time: h
    method: trapezoidal

  - platform: integration
    source: sensor.hp_hot_water_power
    name: HP Hot Water Energy
    unique_id: hp_hot_water_energy
    unit_prefix: k
    unit_time: h
    method: trapezoidal

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 172.16.0.0/16
    - 172.17.0.0/16
