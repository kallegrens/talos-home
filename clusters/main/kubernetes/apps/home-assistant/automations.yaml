# ===========================================================================
# Tibber Integration Health
# ===========================================================================

- id: "1770642990708"
  alias: Tibber Watchdog
  description: >-
    Checks every 5 min if Tibber pulse sensor is stale (>10 min).
    Attempts one reload; if it fails, sends a persistent notification.
  triggers:
    - minutes: /5
      trigger: time_pattern
  conditions:
    - condition: template
      value_template: >-
        {% set stale_threshold_sec = 600 %}
        {% set e = states.sensor.tibber_pulse_lavendelgangen_3_power %}
        {{ e is not none and (now() - e.last_updated).total_seconds() > stale_threshold_sec }}
  actions:
    - action: homeassistant.reload_config_entry
      target:
        entity_id: sensor.tibber_pulse_lavendelgangen_3_power
      continue_on_error: true
    - delay: 00:00:30
    - condition: template
      value_template: >-
        {% set stale_threshold_sec = 600 %}
        {% set e = states.sensor.tibber_pulse_lavendelgangen_3_power %}
        {{ e is none or (now() - e.last_updated).total_seconds() > stale_threshold_sec }}
    - action: persistent_notification.create
      data:
        title: "Tibber Integration Stuck"
        message: >-
          Tibber pulse sensor stale >10 min and reload failed.
          HA restart required. Time: {{ now().isoformat() }}
        notification_id: tibber_stuck
  mode: single

- id: "1770700000005"
  alias: Tibber Cache - Populate on Startup
  description: >-
    Waits 3 min after HA start for Tibber to fully load, then fires
    a custom event that the template sensor can listen for.
  triggers:
    - trigger: homeassistant
      event: start
  actions:
    - delay: "00:03:00"
    - event: tibber_cache_refresh
  mode: single

# ===========================================================================
# EMHASS MPC Optimization
# ===========================================================================

- id: "1770700000006"
  alias: EMHASS MPC Loop
  description: >-
    Runs MPC every 4 min with dynamic prediction horizon matching
    available price data. After MPC completes, an explicit
    publish-data call posts results to HA sensors. This is a
    resilience measure: EMHASS's continual_publish background
    thread can crash silently, leaving sensors stale while MPC
    keeps running. The explicit publish ensures sensor freshness.
    4 min chosen because it is coprime with the 15-min price slot
    boundary (GCD=1), preventing systematic alignment flip-flop,
    while giving faster SOC feedback than the previous 7-min cycle.
  triggers:
    - minutes: /4
      trigger: time_pattern
    - trigger: state
      entity_id: input_boolean.ev_charge_requested
      to: "on"
  conditions:
    - condition: template
      value_template: >-
        {{ (state_attr('sensor.nordpool_kwh_se3_sek_3_10_0', 'raw_today') | default([], true) | length > 0)
           and states('sensor.goodwe_battery_state_of_charge') | is_number }}
  actions:
    - action: rest_command.emhass_mpc_optim
    - delay:
        seconds: 2
    - action: rest_command.emhass_publish_data
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.emhass_last_publish
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

- id: "1770700000007"
  alias: EMHASS PV Forecast Cache
  description: >-
    Caches PV weather forecast 3x daily so MPC runs reuse cached data
    instead of hitting Open-Meteo every 5 min.
  triggers:
    - at: "06:00:00"
      trigger: time
    - at: "12:00:00"
      trigger: time
    - at: "18:00:00"
      trigger: time
  actions:
    - action: rest_command.emhass_weather_cache
  mode: single

# ===========================================================================
# GoodWe Battery Control
# ===========================================================================

- id: "1770700000003"
  alias: EMHASS Battery Control
  description: >-
    Translates EMHASS p_batt_forecast into GoodWe eco-mode commands.
    Triggered by MPC publishing a new forecast OR soc target change.

    Anti-jitter: consecutive-idle ≥2 filter. The MPC re-solves every
    ~4 min and often oscillates between charge/idle on adjacent slots.
    To prevent rapid mode-cycling on the inverter, we require the
    optimizer to say "idle" at least 2 consecutive times before we
    actually transition to idle. Charge/discharge decisions are acted
    on immediately. The streak counter lives in
    input_number.emhass_idle_streak.

    Decision and rate both come from the current slot p_batt value.
    Power % is |p_batt| / 5050W, clamped to 5-100%.

    eco_mode_soc buffer is computed dynamically from the MPC interval:
    buffer = 1.3 × max SOC change per cycle (at full power). This
    gives the inverter headroom to keep acting through the cycle
    without hitting the SOC limit before the next re-solve.

    Grid export limit is set to 0W on discharge to prevent battery
    energy spilling to grid at a loss. On charge/idle the limit is
    lifted so solar export is not blocked.
  triggers:
    - trigger: state
      entity_id: sensor.p_batt_forecast
    - trigger: state
      entity_id: sensor.soc_batt_forecast
  conditions:
    - condition: template
      value_template: >-
        {{ states('sensor.p_batt_forecast') not in ['unknown', 'unavailable']
           and states('sensor.soc_batt_forecast') not in ['unknown', 'unavailable'] }}
  actions:
    - variables:
        # --- Hardware constants ---
        inverter_rated_w: 10000
        batt_max_w: 5050
        batt_capacity_wh: 14200
        grid_export_limit_w: 10000
        grid_export_discharge_w: 0
        min_power_pct: 5
        min_soc_pct: 5
        max_soc_pct: 100
        # GoodWe device_id for goodwe.set_parameter service
        goodwe_device_id: "ea2d8925fee08c1321c7f038b61e111e"
        # Default battery charge/discharge current (A)
        default_charge_current: 25
        default_discharge_current: 25
        # --- Tuning parameters ---
        mpc_interval_min: 4
        deadband_w: 200
        idle_streak_required: 2
        soc_buffer_safety_factor: 1.3
        soc_buffer_min_pct: 2
        default_soc: 50
        # --- Sensor readings ---
        p_batt: "{{ states('sensor.p_batt_forecast') | float(0) }}"
        target_soc: "{{ states('sensor.soc_batt_forecast') | float(default_soc) }}"
        # --- Derived values ---
        soc_buffer: >-
          {{ [((batt_max_w * mpc_interval_min / 60 / batt_capacity_wh * 100) * soc_buffer_safety_factor) | round(0) | int, soc_buffer_min_pct] | max }}
        # Max eco_mode_power % the battery can physically deliver/absorb
        max_power_pct: "{{ (batt_max_w / inverter_rated_w * 100) | round(0) | int }}"
        # Power % of inverter rated power, clamped [min_power_pct .. max_power_pct]
        # GoodWe firmware interprets eco_mode_power as % of inverter_rated_w (10kW),
        # NOT battery max. E.g. 20% = 2000W cap on charge/discharge rate.
        # Upper clamp = batt_max_w/inverter_rated_w ≈ 50% (battery can't exceed 5050W).
        power_pct: >-
          {{ [[(( p_batt | float | abs) / inverter_rated_w * 100) | round(0) | int, min_power_pct] | max, max_power_pct | int] | min }}
        # Decision from current slot
        raw_decision: >-
          {% if p_batt | float < -deadband_w %}charge
          {% elif p_batt | float > deadband_w %}discharge
          {% else %}idle{% endif %}
        # Read and update idle streak
        prev_streak: "{{ states('input_number.emhass_idle_streak') | int(0) }}"
        new_streak: >-
          {% if raw_decision == 'idle' %}{{ prev_streak + 1 }}
          {% else %}0{% endif %}
        # Final decision: suppress idle unless streak reaches threshold
        decision: >-
          {% if raw_decision == 'idle' and new_streak | int < idle_streak_required %}hold
          {% else %}{{ raw_decision }}{% endif %}
    # Always persist the streak counter
    - action: input_number.set_value
      target:
        entity_id: input_number.emhass_idle_streak
      data:
        value: "{{ new_streak }}"
    - choose:
        # --- CHARGE ---
        # eco_charge: grid+PV → battery at controlled rate.
        # Order matters: set eco mode FIRST, then restore currents
        # AFTER a delay. The work_mode register write inside
        # set_operation_mode can reset battery current registers,
        # so they must be written last to stick.
        - conditions:
            - condition: template
              value_template: "{{ decision == 'charge' }}"
          sequence:
            - action: select.select_option
              target:
                entity_id: select.goodwe_ems_mode
              data:
                option: auto
            - action: number.set_value
              target:
                entity_id: number.goodwe_grid_export_limit
              data:
                value: "{{ grid_export_limit_w }}"
            - action: number.set_value
              target:
                entity_id: number.goodwe_eco_mode_power
              data:
                value: "{{ power_pct }}"
            - action: number.set_value
              target:
                entity_id: number.goodwe_eco_mode_soc
              data:
                value: "{{ [target_soc | round(0) | int + soc_buffer | int, max_soc_pct] | min }}"
            - action: select.select_option
              target:
                entity_id: select.goodwe_inverter_operation_mode
              data:
                option: eco_charge
            - delay:
                seconds: 2
            - action: goodwe.set_parameter
              data:
                device_id: "{{ goodwe_device_id }}"
                parameter: battery_charge_current
                value: "{{ default_charge_current }}"
            - action: goodwe.set_parameter
              data:
                device_id: "{{ goodwe_device_id }}"
                parameter: battery_discharge_current
                value: "{{ default_discharge_current }}"

        # --- DISCHARGE ---
        # eco_discharge: battery → house at controlled rate.
        # grid_export_limit=0 prevents battery→grid spill.
        # Order matters: set eco mode FIRST, then restore currents
        # AFTER a delay. The work_mode register write inside
        # set_operation_mode can reset battery current registers
        # (observed: idle→discharge stuck at 0A without this).
        - conditions:
            - condition: template
              value_template: "{{ decision == 'discharge' }}"
          sequence:
            - action: select.select_option
              target:
                entity_id: select.goodwe_ems_mode
              data:
                option: auto
            - action: switch.turn_on
              target:
                entity_id: switch.goodwe_grid_export_limit_switch
            - action: number.set_value
              target:
                entity_id: number.goodwe_grid_export_limit
              data:
                value: "{{ grid_export_discharge_w }}"
            - action: number.set_value
              target:
                entity_id: number.goodwe_eco_mode_power
              data:
                value: "{{ power_pct }}"
            - action: number.set_value
              target:
                entity_id: number.goodwe_eco_mode_soc
              data:
                value: "{{ [target_soc | round(0) | int - soc_buffer | int, min_soc_pct] | max }}"
            - action: select.select_option
              target:
                entity_id: select.goodwe_inverter_operation_mode
              data:
                option: eco_discharge
            - delay:
                seconds: 2
            - action: goodwe.set_parameter
              data:
                device_id: "{{ goodwe_device_id }}"
                parameter: battery_charge_current
                value: "{{ default_charge_current }}"
            - action: goodwe.set_parameter
              data:
                device_id: "{{ goodwe_device_id }}"
                parameter: battery_discharge_current
                value: "{{ default_discharge_current }}"

        # --- IDLE (streak reached) ---
        # Uses general mode + EMS charge_pv (limit=0W):
        # - general mode = normal self-use base
        # - EMS charge_pv overrides self-use to prevent discharge
        # - limit=0 means charge = 0 + PV_power: only PV charges
        #   the battery, no grid→battery charging occurs
        # - BMS maintains ~47W trickle (unavoidable hardware min)
        # - When PV is available, surplus charges battery naturally
        #
        # Why not eco_charge? eco schedule dominates EMS layer;
        # eco_charge always charges at eco_mode_power% of rated
        # power (min 500W at 5%). The EMS layer is ignored.
        #
        # Why not battery_standby? Ignored by both eco_charge
        # and general (self-use) — battery discharges normally.
        #
        # Why not discharge_pv? Achieves true 0W idle, but PV
        # surplus would NOT charge battery — exported instead.
        #
        # Empirically tested 2026-02-18: general + charge_pv(0)
        # yields ~47W trickle with PV surplus charging.
        # See idle-charging-analysis.ipynb Section 14.
        - conditions:
            - condition: template
              value_template: "{{ decision == 'idle' }}"
          sequence:
            - action: number.set_value
              target:
                entity_id: number.goodwe_grid_export_limit
              data:
                value: "{{ grid_export_limit_w }}"
            - action: select.select_option
              target:
                entity_id: select.goodwe_inverter_operation_mode
              data:
                option: general
            - action: number.set_value
              target:
                entity_id: number.goodwe_ems_power_limit
              data:
                value: 0
            - action: select.select_option
              target:
                entity_id: select.goodwe_ems_mode
              data:
                option: charge_pv
            - delay:
                seconds: 2
            - action: goodwe.set_parameter
              data:
                device_id: "{{ goodwe_device_id }}"
                parameter: battery_charge_current
                value: "{{ default_charge_current }}"
            - action: goodwe.set_parameter
              data:
                device_id: "{{ goodwe_device_id }}"
                parameter: battery_discharge_current
                value: "{{ default_discharge_current }}"

      # --- HOLD: idle suppressed, keep current mode ---
      # The optimizer said idle but streak < threshold.
      # Do nothing — let the previous charge/discharge continue.
      default: []
  mode: restart

# ===========================================================================
# Failsafe
# ===========================================================================

- id: "1770700000004"
  alias: EMHASS Failsafe
  description: >-
    If EMHASS hasn't published for >20 min, switch to general mode.
    Battery self-consumes for house loads, PV charges battery and
    powers house. This is safe at any SOC because
    depth_of_discharge_backup=97% ensures the backup output stays
    energized down to 3% SOC (below the on-grid floor of 5%).
    Checks every 7 min.

    Uses input_datetime.emhass_last_publish as a heartbeat rather
    than sensor.p_batt_forecast.last_updated, because HA does not
    bump last_updated when EMHASS posts identical state+attributes
    (common during flat forecast periods). The heartbeat is set by
    the MPC Loop automation after every successful publish cycle.
  triggers:
    - minutes: /7
      trigger: time_pattern
  conditions:
    - condition: template
      value_template: >-
        {% set stale_threshold_sec = 1200 %}
        {% set hb_ts = state_attr('input_datetime.emhass_last_publish', 'timestamp') %}
        {{ hb_ts is none or
           (as_timestamp(now()) - hb_ts) > stale_threshold_sec }}
  actions:
    - variables:
        goodwe_device_id: "ea2d8925fee08c1321c7f038b61e111e"
        default_charge_current: 25
        default_discharge_current: 25
        grid_export_limit_w: 10000
    - action: number.set_value
      target:
        entity_id: number.goodwe_grid_export_limit
      data:
        value: "{{ grid_export_limit_w }}"
      continue_on_error: true
    - action: select.select_option
      target:
        entity_id: select.goodwe_inverter_operation_mode
      data:
        option: general
      continue_on_error: true
    - action: select.select_option
      target:
        entity_id: select.goodwe_ems_mode
      data:
        option: auto
      continue_on_error: true
    - delay:
        seconds: 2
    - action: goodwe.set_parameter
      data:
        device_id: "{{ goodwe_device_id }}"
        parameter: battery_charge_current
        value: "{{ default_charge_current }}"
      continue_on_error: true
    - action: goodwe.set_parameter
      data:
        device_id: "{{ goodwe_device_id }}"
        parameter: battery_discharge_current
        value: "{{ default_discharge_current }}"
      continue_on_error: true
    - action: persistent_notification.create
      data:
        title: "EMHASS Failsafe Triggered"
        message: >-
          p_batt_forecast stale >20 min. General mode activated.
          Battery self-consumes, PV charges. EMHASS not controlling.
  mode: single

# ===========================================================================
# EV Charging (Easee + EMHASS deferrable load)
#   input_boolean.ev_charge_requested  = user toggle (on-demand)
#   input_number.ev_target_soc         = desired SOC % (default 80)
#   input_datetime.ev_ready_by         = deadline (date+time)
#   sensor.p_deferrable0               = EMHASS EV power schedule
# ===========================================================================

- id: "1770700000013"
  alias: EV Charge - Validate Request
  description: >-
    On toggle-on: hard-rejects if deadline is in the past (always a
    mistake). Soft-warns if target SOC <= current SOC or car SOC is
    unavailable (legitimate plan-ahead scenarios).
  triggers:
    - trigger: state
      entity_id: input_boolean.ev_charge_requested
      to: "on"
  conditions: []
  actions:
    - variables:
        cur: "{{ states('sensor.wvgzzze2znp061751_battery_level') | float(-1) }}"
        tgt: "{{ states('input_number.ev_target_soc') | float(80) }}"
        ready_ts: "{{ state_attr('input_datetime.ev_ready_by', 'timestamp') | float(0) }}"
        now_ts: "{{ as_timestamp(now()) }}"
        deadline_past: "{{ ready_ts <= now_ts }}"
    - choose:
        # Hard reject: deadline in the past
        - conditions:
            - condition: template
              value_template: "{{ deadline_past }}"
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.ev_charge_requested
            - action: persistent_notification.create
              data:
                title: "❌ EV Charge Request Rejected"
                message: >-
                  Deadline ({{ states('input_datetime.ev_ready_by') }}) is in
                  the past. Update the Ready By time and try again.
                notification_id: ev_charge_rejected
      default:
        # Soft warn: SOC looks odd but request goes through
        - condition: template
          value_template: "{{ (cur >= 0 and tgt <= cur) or cur < 0 }}"
        - action: persistent_notification.create
          data:
            title: "⚠️ EV Charge Request — Heads Up"
            message: >-
              {% if cur >= 0 and tgt <= cur %}
              🔋 Target SOC ({{ tgt | int }}%) ≤ current SOC ({{ cur | int }}%).
              {% endif %}
              {% if cur < 0 %}
              🚗 Car SOC unavailable (car may be asleep).
              {% endif %}
              Charge request accepted anyway.
            notification_id: ev_charge_warning
  mode: single

- id: "1770700000014"
  alias: EV Charge - Insufficient Time Warning
  description: >-
    Fires when the MPC payload caps ev_hours because the deadline
    is too tight to reach the target SOC. Checked every 4 min.
    Compares required hours vs available hours.
  triggers:
    - minutes: /4
      trigger: time_pattern
  conditions:
    - condition: state
      entity_id: input_boolean.ev_charge_requested
      state: "on"
    - condition: template
      value_template: >-
        {{ states('sensor.laddare_vid_husknuten_status') in ['awaiting_start', 'charging', 'completed'] }}
    - condition: template
      value_template: >-
        {% set ev_soc = states('sensor.wvgzzze2znp061751_battery_level') | float(-1) %}
        {% set ev_target = states('input_number.ev_target_soc') | float(80) %}
        {% set ev_battery_kwh = 77 %}
        {% set ev_charge_kw = 11.04 %}
        {% set ev_charge_overhead = 1.05 %}
        {% set slot_seconds = 900 %}
        {% set ready_ts = state_attr('input_datetime.ev_ready_by', 'timestamp') | float(0) %}
        {% set slots_left = ((ready_ts - as_timestamp(now())) / slot_seconds) | int %}
        {% set hours_needed = ((ev_target - ev_soc) / 100 * ev_battery_kwh / ev_charge_kw * ev_charge_overhead) %}
        {% set hours_available = slots_left * 15 / 60 %}
        {{ ev_soc >= 0 and ev_soc < ev_target and slots_left > 0 and hours_needed > hours_available }}
  actions:
    - variables:
        ev_soc: "{{ states('sensor.wvgzzze2znp061751_battery_level') | float(0) }}"
        ev_target: "{{ states('input_number.ev_target_soc') | float(80) }}"
        ev_battery_kwh: 77
        ev_charge_kw: 11.04
        slot_seconds: 900
        ready_ts: "{{ state_attr('input_datetime.ev_ready_by', 'timestamp') | float(0) }}"
        slots_left: "{{ ((ready_ts - as_timestamp(now())) / slot_seconds) | int }}"
        hours_available: "{{ (slots_left * 15 / 60) | round(1) }}"
        reachable_soc: >-
          {{ (ev_soc | float + (slots_left | int * 0.25 * ev_charge_kw / ev_battery_kwh * 100))
             | round(0) | int }}
    - action: persistent_notification.create
      data:
        title: "⚡ EV Charge — Not Enough Time"
        message: >-
          Only {{ hours_available }}h left until deadline
          ({{ states('input_datetime.ev_ready_by') }}).
          Will charge at max power but can only reach ~{{ reachable_soc }}%
          instead of {{ ev_target | int }}%.
          Extend the deadline or lower the target SOC.
        notification_id: ev_insufficient_time
  mode: single

- id: "1770700000015"
  alias: EV Charge - Pause on Cancel
  description: >-
    When the user (or another automation) turns off ev_charge_requested,
    immediately send a pause command to the Easee charger so it does not
    keep drawing power until the dynamic-limit TTL expires (~600 s).
  triggers:
    - entity_id: input_boolean.ev_charge_requested
      to: "off"
      trigger: state
  conditions:
    - condition: template
      value_template: >-
        {{ states('sensor.laddare_vid_husknuten_status') in ['awaiting_start', 'charging', 'completed'] }}
  actions:
    - action: easee.action_command
      data:
        device_id: 634339e1d534267196267f3613120636
        action_command: pause
      continue_on_error: true
  mode: single

- id: "1770700000010"
  alias: EV Charge Control
  description: >-
    Translates EMHASS p_deferrable0 into Easee charger commands.
    Converts scheduled watts to amps (6-16A per phase, 3-phase).
    One phase-amp = 230V → 690W per amp total.
    When p_deferrable0 > 0: resume and set dynamic current limit.
    When p_deferrable0 ≈ 0: pause charging.
    Only acts when ev_charge_requested is ON and cable is plugged in.
  triggers:
    - trigger: state
      entity_id: sensor.p_deferrable0
  conditions:
    - condition: state
      entity_id: input_boolean.ev_charge_requested
      state: "on"
    - condition: template
      value_template: >-
        {{ states('sensor.laddare_vid_husknuten_status') in ['awaiting_start', 'charging', 'completed'] }}
    - condition: template
      value_template: >-
        {{ states('sensor.p_deferrable0') not in ['unknown', 'unavailable'] }}
  actions:
    - variables:
        p_def: "{{ states('sensor.p_deferrable0') | float(0) }}"
        easee_device_id: "634339e1d534267196267f3613120636"
        # 3 phases × 230V = 690W per amp
        watts_per_amp: 690
        min_charge_amps: 6
        max_charge_amps: 16
        charge_current: "{{ [max_charge_amps, [min_charge_amps, (p_def / watts_per_amp) | round(0) | int] | max] | min }}"
        dynamic_limit_ttl: 600
    - choose:
        # --- CHARGE (already active): just update the dynamic limit ---
        # When the charger is already charging, only refresh the current
        # limit. Sending resume would reset the limit to 32A and cause
        # a power spike every MPC cycle.
        - conditions:
            - condition: template
              value_template: "{{ p_def > 0 }}"
            - condition: state
              entity_id: binary_sensor.lavendelgangen_3_compr_operational_status
              state: "off"
            - condition: state
              entity_id: sensor.laddare_vid_husknuten_status
              state: "charging"
          sequence:
            - action: easee.set_charger_dynamic_limit
              data:
                device_id: "{{ easee_device_id }}"
                current: "{{ charge_current }}"
                time_to_live: "{{ dynamic_limit_ttl }}"
              continue_on_error: true
        # --- CHARGE (start): resume then set limit ---
        # Charger is paused/awaiting. Resume resets limit to 32A,
        # so we immediately follow with set_charger_dynamic_limit.
        # This only happens once per charging session, not every 4 min.
        - conditions:
            - condition: template
              value_template: "{{ p_def > 0 }}"
            - condition: state
              entity_id: binary_sensor.lavendelgangen_3_compr_operational_status
              state: "off"
          sequence:
            - action: easee.action_command
              data:
                device_id: "{{ easee_device_id }}"
                action_command: resume
              continue_on_error: true
            - action: easee.set_charger_dynamic_limit
              data:
                device_id: "{{ easee_device_id }}"
                current: "{{ charge_current }}"
                time_to_live: "{{ dynamic_limit_ttl }}"
              continue_on_error: true
        # --- PAUSE: EMHASS says don't charge this slot ---
        - conditions:
            - condition: template
              value_template: "{{ p_def <= 0 }}"
          sequence:
            - action: easee.action_command
              data:
                device_id: "{{ easee_device_id }}"
                action_command: pause
              continue_on_error: true
  mode: single

- id: "1770700000011"
  alias: EV Charge Complete
  description: >-
    Auto-clears ev_charge_requested only when EV SOC reaches the
    target. Unplugging or leaving home does NOT cancel the request —
    EMHASS naturally can't charge an unplugged car, and the request
    stays active so charging resumes when you plug back in.
  triggers:
    - trigger: state
      entity_id: sensor.wvgzzze2znp061751_battery_level
  conditions:
    - condition: state
      entity_id: input_boolean.ev_charge_requested
      state: "on"
    - condition: template
      value_template: >-
        {{ states('sensor.wvgzzze2znp061751_battery_level') | float(0)
           >= states('input_number.ev_target_soc') | float(80) }}
  actions:
    - variables:
        ev_soc: "{{ states('sensor.wvgzzze2znp061751_battery_level') | float(0) }}"
        ev_target: "{{ states('input_number.ev_target_soc') | float(80) }}"
        easee_device_id: "634339e1d534267196267f3613120636"
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.ev_charge_requested
    - action: easee.action_command
      data:
        device_id: "{{ easee_device_id }}"
        action_command: pause
      continue_on_error: true
    - action: persistent_notification.create
      data:
        title: "🔋 EV Charge Complete"
        message: >-
          ID.4 reached {{ ev_soc }}% SOC (target: {{ ev_target }}%).
          Charge request cleared at {{ now().strftime('%H:%M') }}.
        notification_id: ev_charge_complete
  mode: single

- id: "1770700000012"
  alias: EV Charge Failsafe
  description: >-
    If EMHASS hasn't published for >20 min while the charger is
    actively charging, pause the charger. Prevents uncontrolled
    grid draw if EMHASS crashes. Checks every 7 min (same cadence
    as the battery failsafe).
  triggers:
    - minutes: /7
      trigger: time_pattern
  conditions:
    - condition: state
      entity_id: sensor.laddare_vid_husknuten_status
      state: "charging"
    - condition: template
      value_template: >-
        {% set stale_threshold_sec = 1200 %}
        {% set hb_ts = state_attr('input_datetime.emhass_last_publish', 'timestamp') %}
        {{ hb_ts is none or
           (as_timestamp(now()) - hb_ts) > stale_threshold_sec }}
  actions:
    - variables:
        easee_device_id: "634339e1d534267196267f3613120636"
    - action: easee.action_command
      data:
        device_id: "{{ easee_device_id }}"
        action_command: pause
      continue_on_error: true
    - action: persistent_notification.create
      data:
        title: "⚠️ EV Charge Failsafe"
        message: >-
          EMHASS stale >20 min while EV was charging. Charger paused.
          Re-enable ev_charge_requested after EMHASS recovers.
          Time: {{ now().strftime('%H:%M') }}
        notification_id: ev_failsafe
  mode: single

# ===========================================================================
# VW Car Charge Target Sync
#   Makes input_number.ev_target_soc the single source of truth.
#   Pushes the value to the VW car's battery_target_charge_level
#   (ceil to next multiple of 10, clamped 50-100 so the car's BMS never
#   stops early — EMHASS controls the precise cutoff). Disables
#   battery_care_mode when target > 80% (care mode caps at 80%).
#   Re-enables it when ≤ 80%.
# ===========================================================================

- id: "1770700000018"
  alias: EV Charge - Sync Car Target SOC
  description: >-
    When the user changes ev_target_soc in the dashboard, push the
    value to the VW ID.4's battery_target_charge_level. The car
    entity only accepts multiples of 10 (50-100), so we ceil to the
    next multiple — this ensures the car's BMS never stops charging
    before EMHASS reaches the real target. EMHASS publishes p_def=0
    at the precise SOC.
    If the target exceeds 80%, battery_care_mode must be turned off
    because it hard-caps charging at 80%. When target is ≤ 80%,
    battery_care_mode is turned back on to preserve battery health.
    Note: The volkswagencarnet integration raises non-HomeAssistantError
    exceptions on API failure (429 rate-limit), which bypasses HA's
    continue_on_error. A shell_command wrapper catches these so the
    automation always completes.
  triggers:
    - trigger: state
      entity_id: input_number.ev_target_soc
  conditions:
    - condition: template
      value_template: >-
        {{ trigger.to_state.state not in ['unknown', 'unavailable']
           and trigger.from_state.state != trigger.to_state.state }}
  actions:
    - variables:
        ha_target: "{{ states('input_number.ev_target_soc') | float(80) }}"
        # Ceil to next multiple of 10, clamp to VW range 50-100.
        # Ceil ensures the car's BMS never stops before EMHASS reaches
        # the real target — EMHASS publishes p_def=0 at the exact SOC.
        car_target: "{{ [100, [50, (((ha_target / 10) | round(0, 'ceil')) | int * 10)] | max] | min }}"
        need_care_off: "{{ car_target | int > 80 }}"
    # Notification FIRST — the VW cloud API may fail (429 rate-limit)
    # and the volkswagencarnet integration raises errors that bypass
    # HA's continue_on_error. By notifying first, the user always
    # sees what was intended regardless of VW cloud flakiness.
    - action: persistent_notification.create
      data:
        title: "🔋 Syncing car charge target"
        message: >-
          HA target: {{ ha_target | int }}% → Car target: {{ car_target }}%.
          Battery care mode: {{ 'OFF' if need_care_off else 'ON' }}.
          Sending to VW cloud…
        notification_id: ev_car_target_sync
    # --- Battery care mode ---
    # Disable when targeting > 80% (care mode hard-caps at 80%).
    # Re-enable when ≤ 80% for battery health.
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ need_care_off and is_state('switch.wvgzzze2znp061751_battery_care_mode', 'on') }}"
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.wvgzzze2znp061751_battery_care_mode
        - conditions:
            - condition: template
              value_template: "{{ not need_care_off and is_state('switch.wvgzzze2znp061751_battery_care_mode', 'off') }}"
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.wvgzzze2znp061751_battery_care_mode
    - delay:
        seconds: 5
    # --- Set the car's charge target ---
    - action: number.set_value
      target:
        entity_id: number.wvgzzze2znp061751_battery_target_charge_level
      data:
        value: "{{ car_target }}"
  mode: restart

# ===========================================================================
# Heat Pump Priority (compressor preempts EV charging)
# ===========================================================================

- id: "1770700000016"
  alias: EV Charge - Heat Pump Preempt
  description: >-
    Heat pump compressor always gets priority over EV charging.
    When the compressor starts, immediately pause the Easee charger.
    The EV Charge Control automation has a compressor-off guard on
    its resume branch, so EMHASS's regular 4-min MPC cycle cannot
    resume the charger while the compressor is running.
    When the compressor stops, the release automation triggers an
    MPC re-evaluation to reschedule EV charging promptly.
  triggers:
    - trigger: state
      entity_id: binary_sensor.lavendelgangen_3_compr_operational_status
      to: "on"
  conditions:
    - condition: state
      entity_id: input_boolean.ev_charge_requested
      state: "on"
    - condition: state
      entity_id: sensor.laddare_vid_husknuten_status
      state: "charging"
  actions:
    - action: easee.action_command
      data:
        device_id: 634339e1d534267196267f3613120636
        action_command: pause
      continue_on_error: true
    - action: persistent_notification.create
      data:
        title: "🔥 EV Charge Paused — Heat Pump"
        message: >-
          Heat pump compressor started. EV charging paused to give
          priority. Will resume when compressor stops and EMHASS
          reschedules. Time: {{ now().strftime('%H:%M') }}
        notification_id: ev_heatpump_preempt
  mode: single

- id: "1770700000017"
  alias: EV Charge - Heat Pump Release MPC
  description: >-
    When the heat pump compressor stops, trigger an immediate MPC
    re-evaluation so EMHASS can reschedule EV charging without
    waiting up to 4 min for the next regular cycle. The updated
    p_deferrable0 will trigger EV Charge Control to resume if the
    optimizer still wants the EV to charge.
  triggers:
    - trigger: state
      entity_id: binary_sensor.lavendelgangen_3_compr_operational_status
      to: "off"
  conditions:
    - condition: state
      entity_id: input_boolean.ev_charge_requested
      state: "on"
    - condition: template
      value_template: >-
        {{ states('sensor.laddare_vid_husknuten_status') in ['awaiting_start', 'charging', 'completed'] }}
  actions:
    - action: rest_command.emhass_mpc_optim
    - delay:
        seconds: 2
    - action: rest_command.emhass_publish_data
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.emhass_last_publish
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
  mode: single

# ===========================================================================
# Snow Detection  (latching design)
#   binary_sensor.solar_snow_detected  = real-time detector (daytime only)
#   input_boolean.solar_panels_snow_covered = latching flag checked by MPC
# ===========================================================================

- id: "1770700000008"
  alias: Solar Snow - Latch ON
  description: >-
    When the detector fires (forecast > 100W, actual < 5%), latch the
    input_boolean ON. Requires the boolean to have been OFF for at
    least 1 hour, preventing re-latch after manual override or
    auto-clear.
  triggers:
    - trigger: state
      entity_id: binary_sensor.solar_snow_detected
      to: "on"
  conditions:
    - condition: state
      entity_id: input_boolean.solar_panels_snow_covered
      state: "off"
      for: "01:00:00" # relatch_cooldown: min off-time before re-latching
  actions:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.solar_panels_snow_covered
    - action: persistent_notification.create
      data:
        title: "☃️ Snow Mode Active"
        message: >-
          Auto-detected snow on panels at {{ now().strftime('%H:%M') }}.
          Forecast={{ states('sensor.p_pv_forecast') }}W,
          actual={{ states('sensor.goodwe_pv_power') }}W.
          MPC will zero PV forecast until panels are clear.
        notification_id: solar_snow
  mode: single

- id: "1770700000009"
  alias: Solar Snow - Auto Clear
  description: >-
    Clears snow mode only when there is strong evidence panels are
    truly clear: actual PV > 50% of clear-sky estimate AND > 200W
    absolute, sustained for 30 min, between sunrise and sunset when
    sun is up and gives a reliable signal. Prevents false clears
    from light leaking around snow edges or brief cloud gaps.

    Uses sensor.power_production_now from Forecast.Solar as the
    clear-sky reference instead of sensor.p_pv_forecast, which
    during snow mode reflects yesterday's (degraded) profile and
    creates a circular dependency that clears the latch too easily.
  triggers:
    - trigger: template
      value_template: >-
        {% set snow_clear_min_w = 200 %}
        {% set snow_clear_ratio = 0.50 %}
        {% set clearsky = states('sensor.power_production_now') | float(0) %}
        {% set actual = states('sensor.goodwe_pv_power') | float(0) %}
        {% set sun_up = is_state('sun.sun', 'above_horizon') %}
        {{ sun_up and clearsky > snow_clear_min_w and actual > snow_clear_min_w
           and actual > clearsky * snow_clear_ratio }}
      for: "00:30:00" # snow_clear_sustain_duration
  conditions:
    - condition: state
      entity_id: input_boolean.solar_panels_snow_covered
      state: "on"
  actions:
    - action: input_boolean.turn_off
      target:
        entity_id: input_boolean.solar_panels_snow_covered
    - action: persistent_notification.create
      data:
        title: "☀️ Snow Mode Cleared"
        message: >-
          Panels confirmed clear at {{ now().strftime('%H:%M') }}
          ({{ states('sensor.goodwe_pv_power') }}W actual vs
          {{ states('sensor.power_production_now') }}W Forecast.Solar
          clear-sky estimate, sustained 30 min).
          Normal PV forecast restored.
        notification_id: solar_snow
  mode: single

# ---------------------------------------------------------------------------
# iOS Widget Refresh
# ---------------------------------------------------------------------------
- id: "1770700000020"
  alias: iOS Widget - Refresh EV Plan
  description: >-
    Sends a silent push to refresh iOS widgets when EV plan state changes.
    Budget: ~40-70 updates/day allowed by iOS, so only trigger on
    meaningful transitions, not every sensor tick.
  triggers:
    - trigger: state
      entity_id:
        - input_boolean.ev_charge_requested
        - sensor.laddare_vid_husknuten_status
        - sensor.ev_plan_status
  conditions:
    # Don't fire on unavailable/unknown transitions
    - condition: template
      value_template: >-
        {{ trigger.to_state.state not in ['unavailable', 'unknown']
           and trigger.from_state.state != trigger.to_state.state }}
  actions:
    - delay: "00:00:05"
    - action: notify.mobile_app_karls_iphone_13
      data:
        message: update_widgets
  mode: restart

# ---------------------------------------------------------------------------
# VW Cabin Pre-conditioning — Departure Timer Sync
# ---------------------------------------------------------------------------
- id: "1770700000030"
  alias: VW Cabin - Sync Departure Timer
  description: >-
    Syncs VW AC departure timer slot 3 with input_datetime.ev_ready_by
    so the cabin is pre-conditioned before the EV charge deadline.
    Only active when ev_charge_requested is on. Timer slot 2 is used
    (slot 1 is reserved for manual/VW-app use).
  triggers:
    - trigger: state
      entity_id: input_boolean.ev_charge_requested
    - trigger: state
      entity_id: input_datetime.ev_ready_by
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: state
              entity_id: input_boolean.ev_charge_requested
              state: "on"
          sequence:
            - action: volkswagencarnet.update_schedule
              data:
                device_id: "863e6f6fdaa5710678e596183d8f23c0"
                vehicle_series: "ID. Series"
                timer_id: 2
                timer_type: "AC Departure Timer"
                enabled: true
                frequency: "single"
                departure_datetime: >-
                  {{ states('input_datetime.ev_ready_by') }}
      default:
        - action: volkswagencarnet.update_schedule
          data:
            device_id: "863e6f6fdaa5710678e596183d8f23c0"
            vehicle_series: "ID. Series"
            timer_id: 2
            timer_type: "AC Departure Timer"
            enabled: false
            frequency: "single"
            departure_datetime: >-
              {{ states('input_datetime.ev_ready_by') }}
  mode: single
