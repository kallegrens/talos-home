title: EV Charging
views:
  - title: EV Charging
    path: ev
    icon: mdi:ev-station
    type: sections
    max_columns: 2
    sections:
      # ── Control ─────────────────────────────────────────────
      - title: Control
        cards:
          - type: tile
            entity: input_boolean.ev_charge_requested
            name: Request Charge
            icon: mdi:ev-station
            color: green
            vertical: true
            tap_action:
              action: toggle

          - type: tile
            entity: input_number.ev_target_soc
            name: Target SOC
            icon: mdi:battery-charging-80
            color: blue
            tap_action:
              action: none
            features:
              - type: custom:service-call
                entries:
                  - type: slider
                    entity_id: input_number.ev_target_soc
                    range:
                      - >-
                        {{ states('sensor.wvgzzze2znp061751_battery_level')
                        | float(10) | round(0) }}
                      - 100
                    step: 1
                    unit_of_measurement: "%"
                    tap_action:
                      action: perform-action
                      perform_action: input_number.set_value
                      data:
                        value: "{{ value }}"
                      target:
                        entity_id: input_number.ev_target_soc

          - type: tile
            entity: input_datetime.ev_ready_by
            name: Ready By
            icon: mdi:clock-end
            color: amber
            tap_action:
              action: none
            features:
              - type: custom:service-call
                entries:
                  - type: input
                    entity_id: input_datetime.ev_ready_by
                    thumb: datetime-local
                    range:
                      - "{{ now().strftime('%Y-%m-%dT%H:%M') }}"
                      - >-
                        {{ (now() + timedelta(days=7)).strftime('%Y-%m-%dT%H:%M') }}
                    step: 900
                    tap_action:
                      action: perform-action
                      perform_action: input_datetime.set_datetime
                      data:
                        datetime: "{{ value }}"
                      target:
                        entity_id: input_datetime.ev_ready_by

          - type: tile
            entity: sensor.ev_plan_status
            name: Plan Status
            color: primary

      # ── Live Status ─────────────────────────────────────────
      - title: Live Status
        cards:
          - type: tile
            entity: sensor.wvgzzze2znp061751_battery_level
            name: Car SOC
            icon: mdi:car-battery
            color: green

          - type: tile
            entity: sensor.ev_plan_progress
            name: Charge Progress
            color: blue

          - type: tile
            entity: sensor.ev_plan_time_remaining
            name: Time Remaining
            color: amber

          - type: tile
            entity: sensor.ev_plan_energy_needed
            name: Energy Needed
            color: cyan

          - type: tile
            entity: sensor.laddare_vid_husknuten_power
            name: Charger Power
            icon: mdi:flash
            color: orange

          - type: tile
            entity: sensor.laddare_vid_husknuten_status
            name: Charger Status
            icon: mdi:ev-plug-type2

          - type: tile
            entity: sensor.p_deferrable0
            name: Scheduled Power
            icon: mdi:chart-timeline-variant

          - type: tile
            entity: device_tracker.vw_id_4_position
            name: Car Location
            icon: mdi:map-marker

      # ── History ─────────────────────────────────────────────
      - title: History
        cards:
          - type: history-graph
            title: Charger Power (24h)
            hours_to_show: 24
            entities:
              - entity: sensor.laddare_vid_husknuten_power
                name: Actual
              - entity: sensor.p_deferrable0
                name: Scheduled

          - type: history-graph
            title: Car SOC (48h)
            hours_to_show: 48
            entities:
              - entity: sensor.wvgzzze2znp061751_battery_level
                name: SOC

      # ── Costs ───────────────────────────────────────────────
      - title: Costs
        cards:
          - type: entities
            show_header_toggle: false
            entities:
              - entity: sensor.laddare_vid_husknuten_cost_day
                name: Today
              - entity: sensor.laddare_vid_husknuten_cost_month
                name: This month
              - entity: sensor.laddare_vid_husknuten_lifetime_energy
                name: Lifetime energy
