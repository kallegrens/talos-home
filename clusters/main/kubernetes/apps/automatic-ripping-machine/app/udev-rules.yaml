---
apiVersion: v1
kind: ConfigMap
metadata:
  name: arm-udev-rules
  namespace: automatic-ripping-machine
data:
  52-arm-optical-perms.rules: |
    # Fix permissions on generic-device-plugin device nodes (always root:root).
    # Match the MATSHITA drive by identity because sr numbering is unstable.
    SUBSYSTEM=="block", KERNEL=="sr[0-9]*", ATTRS{vendor}=="MATSHITA*", ATTRS{model}=="BD-MLT UJ265*", ACTION=="add|change", RUN+="/bin/sh -c '/bin/chown root:cdrom /dev/optical /dev/cdrom /dev/optical-sg /host-dev/optical /host-dev/cdrom /host-dev/optical-sg 2>/dev/null || true'"
  51-docker-arm.rules: |
    # Shadows /lib/udev/rules.d/51-docker-arm.rules.
    # Intentionally empty: automatic udev startup is masked until the dynamic
    # /host-dev optical path is validated with manual UI rips.
