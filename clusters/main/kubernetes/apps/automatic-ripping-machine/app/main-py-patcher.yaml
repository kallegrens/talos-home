apiVersion: v1
kind: ConfigMap
metadata:
  name: arm-main-py-patcher
  namespace: automatic-ripping-machine
data:
  apply_patch.py: |
    #!/usr/bin/env python3
    """
    Patches /opt/arm/arm/ripper/main.py to resolve optical drive symlinks
    by device identity (major:minor) so drive re-enumeration from sr0 to sr1
    (or any srX) does not spawn duplicate ARM jobs.

    Applied by an init container on every pod start.
    """
    import sys

    SRC = '/opt/arm/arm/ripper/main.py'
    DST = '/patched/main.py'

    OLD = '    drive = SystemDrives.query.filter_by(mount=devpath).one()  # unique mounts'

    NEW = (
        '    import os as _os\n'
        '    try:\n'
        '        _input_rdev = _os.stat(devpath).st_rdev\n'
        '        for _d in SystemDrives.query.all():\n'
        '            try:\n'
        '                if _os.stat(_d.mount).st_rdev == _input_rdev:\n'
        '                    devpath = _d.mount\n'
        '                    break\n'
        '            except OSError:\n'
        '                pass\n'
        '    except OSError:\n'
        '        pass\n'
        '    drive = SystemDrives.query.filter_by(mount=devpath).one()  # unique mounts'
    )

    with open(SRC, 'r') as f:
        content = f.read()

    if OLD not in content:
        print(f'ERROR: patch target not found in {SRC}', file=sys.stderr)
        print('ARM version may have changed; patch needs updating', file=sys.stderr)
        sys.exit(1)

    patched = content.replace(OLD, NEW, 1)

    with open(DST, 'w') as f:
        f.write(patched)

    print(f'Patch applied: {SRC} -> {DST}')

    # Patch utils.py to add -f flag to abcde invocation so old work dirs
    # are always deleted rather than resumed.
    UTILS_SRC = '/opt/arm/arm/ripper/utils.py'
    UTILS_DST = '/patched-utils/utils.py'

    UTILS_OLD = 'cmd = f\'abcde -d "{job.devpath}" -c {abcfile} >> "{os.path.join(job.config.LOGPATH, logfile)}" 2>&1\''
    UTILS_NEW = 'cmd = f\'abcde -f -d /dev/optical -c {abcfile} >> "{os.path.join(job.config.LOGPATH, logfile)}" 2>&1\''

    with open(UTILS_SRC, 'r') as f:
        utils_content = f.read()

    if UTILS_OLD not in utils_content:
        print(f'ERROR: utils.py patch target not found', file=sys.stderr)
        sys.exit(1)

    utils_patched = utils_content.replace(UTILS_OLD, UTILS_NEW, 1)

    with open(UTILS_DST, 'w') as f:
        f.write(utils_patched)

    print(f'Patch applied: {UTILS_SRC} -> {UTILS_DST}')
