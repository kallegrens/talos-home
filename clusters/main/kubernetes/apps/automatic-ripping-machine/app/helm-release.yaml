---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: automatic-ripping-machine
  namespace: automatic-ripping-machine
spec:
  interval: 15m
  chart:
    spec:
      chart: automatic-ripping-machine
      version: 6.24.3
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    TZ: Europe/Stockholm

    credentials:
      b2:
        type: s3
        url: "https://${BACKBLAZE_ENDPOINT}"
        bucket: "${BACKBLAZE_BUCKET_NAME}"
        accessKey: "${BACKBLAZE_KEY_ID}"
        secretKey: "${BACKBLAZE_APPLICATION_KEY}"
        encrKey: "${RESTIC_ENCRYPTION_KEY}"

    volumeClaimTemplates:
      - name: arm
        annotations:
          longhorn.io/recurring-job-selector: '[{"name":"trim-caches","isGroup":true}]'

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
        hosts:
          - host: arm.${DOMAIN_0}

    persistence:
      arm:
        type: pvc
        volsync:
          - name: arm
            type: restic
            credentials: b2
            dest:
              enabled: false
            src:
              enabled: true
      config:
        type: pvc
        volsync:
          - name: config
            type: restic
            credentials: b2
            dest:
              enabled: false
            src:
              enabled: true
      audio:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: /mnt/lundgrens_data/plex-media/Audiobooks/Originals/automatic-ripping-machine
        mountPath: /home/arm/music
        targetSelector:
          main:
            main: {}
            arm-perms: {}

      video:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: /mnt/lundgrens_data/plex-media/automatic-ripping-machine
        mountPath: /home/arm/media
        targetSelector:
          main:
            main: {}
            arm-perms: {}

    workload:
      main:
        replicas: 0
        podSpec:
          containers:
            main:
              resources:
                limits:
                  truecharts.org/bluray: 1
