---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: automatic-ripping-machine
  namespace: automatic-ripping-machine
spec:
  interval: 15m
  chart:
    spec:
      chart: automatic-ripping-machine
      version: 7.3.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    TZ: Europe/Stockholm

    credentials:
      b2:
        type: s3
        url: "https://${BACKBLAZE_ENDPOINT}"
        bucket: "${BACKBLAZE_BUCKET_NAME}"
        accessKey: "${BACKBLAZE_KEY_ID}"
        secretKey: "${BACKBLAZE_APPLICATION_KEY}"
        encrKey: "${RESTIC_ENCRYPTION_KEY}"

    volumeClaimTemplates:
      - name: arm
        annotations:
          longhorn.io/recurring-job-selector: '[{"name":"trim-caches","isGroup":true}]'

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
        hosts:
          - host: arm.${DOMAIN_0}

    persistence:
      arm:
        type: pvc
        volsync:
          - name: arm
            type: restic
            credentials: b2
            dest:
              enabled: false
            src:
              enabled: true
              moverSecurityContext:
                fsGroupChangePolicy: "OnRootMismatch"
      config:
        type: pvc
        volsync:
          - name: config
            type: restic
            credentials: b2
            dest:
              enabled: false
            src:
              enabled: true
              moverSecurityContext:
                fsGroupChangePolicy: "OnRootMismatch"
      audio:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: /mnt/lundgrens_data/plex-media/Audiobooks/Originals/automatic-ripping-machine
        mountPath: /home/arm/music
        targetSelector:
          main:
            main: {}
            arm-perms: {}

      video:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: /mnt/lundgrens_data/plex-media/automatic-ripping-machine
        mountPath: /home/arm/media
        targetSelector:
          main:
            main: {}
            arm-perms: {}

      abcde-conf:
        enabled: true
        type: configmap
        objectName: abcde-conf
        expandObjectName: false
        mountPath: /home/arm/.abcde.conf
        subPath: abcde.conf

    securityContext:
      container:
        privileged: true

    workload:
      main:
        replicas: 1
        podSpec:
          initContainers:
            fix-optical-perms:
              image:
                repository: busybox
                tag: latest
                pullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - "chmod 660 /dev/optical && chgrp cdrom /dev/optical && echo 'Fixed /dev/optical permissions'"
              securityContext:
                privileged: true
          containers:
            main:
              env:
                SKIP_TRANSCODE: "true"
                RIPMETHOD: "mkv"
              resources:
                limits:
                  truecharts.org/bluray: 1
                  memory: 8Gi
