apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  interval: 15m
  chart:
    spec:
      chart: jellyfin
      version: 22.6.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    TZ: Europe/Stockholm

    credentials:
      b2:
        type: s3
        url: "https://${BACKBLAZE_ENDPOINT}"
        bucket: "${BACKBLAZE_BUCKET_NAME}"
        accessKey: "${BACKBLAZE_KEY_ID}"
        secretKey: "${BACKBLAZE_APPLICATION_KEY}"
        encrKey: "${RESTIC_ENCRYPTION_KEY}"

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
        hosts:
          - host: jellyfin.${DOMAIN_0}

    persistence:
      config:
        type: pvc
        volsync:
          - name: config
            type: restic
            credentials: b2
            dest:
              enabled: false
            src:
              enabled: true
      data:
        enabled: true
        type: pvc
        volsync:
          - name: data
            type: restic
            credentials: b2
            dest:
              enabled: false
            src:
              enabled: true
      movies:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: /mnt/lundgrens_data/plex-media/Movies
        mountPath: /data/movies
      series:
        enabled: true
        type: nfs
        server: ${NFS_IP}
        path: /mnt/lundgrens_data/plex-media/TV-Shows
        mountPath: /data/series

    autodiscovery:
      enabled: true

    resources:
      limits:
        cpu: 6000m
        memory: 8Gi
