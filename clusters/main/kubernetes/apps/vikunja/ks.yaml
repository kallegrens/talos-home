---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vikunja
  namespace: flux-system
spec:
  dependsOn:
    - name: vikunja-db
  interval: 10m
  path: clusters/main/kubernetes/apps/vikunja/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
  wait: true
