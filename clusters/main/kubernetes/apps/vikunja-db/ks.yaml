---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vikunja-db
  namespace: flux-system
spec:
  dependsOn:
    - name: cloudnative-pg
  interval: 10m
  path: clusters/main/kubernetes/apps/vikunja-db/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
  wait: true
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: vikunja-cnpg-main
      namespace: vikunja
