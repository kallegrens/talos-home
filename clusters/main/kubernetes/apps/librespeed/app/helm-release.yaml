---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librespeed
  namespace: librespeed
spec:
  interval: 15m
  chart:
    spec:
      chart: librespeed
      version: 16.18.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: Europe/Stockholm

    credentials:
      b2:
        type: s3
        url: "https://${BACKBLAZE_ENDPOINT}"
        bucket: "${BACKBLAZE_BUCKET_NAME}"
        accessKey: "${BACKBLAZE_KEY_ID}"
        secretKey: "${BACKBLAZE_APPLICATION_KEY}"
        encrKey: "${RESTIC_ENCRYPTION_KEY}"

    persistence:
      config:
        type: pvc
        volsync:
          - name: config
            type: restic
            credentials: b2
            dest:
              enabled: false
            src:
              enabled: true

    ingress:
      main:
        enabled: true
        ingressClassName: internal
        integrations:
          traefik:
            enabled: false
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod
        hosts:
          - host: librespeed.${DOMAIN_0}
