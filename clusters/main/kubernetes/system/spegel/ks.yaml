apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spegel
  namespace: flux-system
spec:
  interval: 10m
  path: clusters/main/kubernetes/system/spegel/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster
  # Suspended: spegel is a P2P image mirror between nodes.
  # Useless on a single-node cluster — no peers to bootstrap from,
  # causing infinite crash loop (routing table empty). Re-enable when
  # adding more nodes.
  suspend: true
