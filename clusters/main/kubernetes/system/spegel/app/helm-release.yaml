---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: spegel
spec:
  # Suspended: spegel is a P2P image mirror between nodes.
  # Useless on a single-node cluster — no peers to bootstrap from,
  # causing infinite crash loop (routing table empty). Re-enable when
  # adding more nodes.
  suspend: true
  interval: 30m
  chart:
    spec:
      chart: spegel
      version: 4.20.2
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values: {}
